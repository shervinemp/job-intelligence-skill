name: linkedin
version: 2

detect:
  domains:
    - linkedin.com

flow_hook: ""

probe:
  best_strategy: dialog
  widgets: {}

patterns:
  already_applied:
    - "applied"
  easy_apply:
    - "easy apply"

properties:
  multi_page: true
  has_eeo: false
  has_progress_bar: true
  page_range: [1, 10]

handler_class: apply.handlers.linkedin.LinkedinHandler

notes: |
  LinkedIn Easy Apply: ephemeral modal overlay. Uses PlatformHandler interface.
  Handler: LinkedinHandler in apply/handlers/linkedin.py.
