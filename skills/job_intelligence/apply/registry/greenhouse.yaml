name: greenhouse
version: 2

detect:
  domains:
    - greenhouse.io
    - boards.greenhouse.io
    - grnh.se

handler_class: apply.handlers.greenhouse.GreenhouseHandler

probe:
  best_strategy: standard

patterns:
  login_wall:
    - "sign in to apply"
    - "already have an account"
  guest_apply:
    - "continue without signing in"
    - "apply as guest"
  already_applied:
    - "you have already applied for this role"
    - "you've already applied"
    - "already applied"

properties:
  multi_page: true
  has_eeo: false
  has_progress_bar: false
  page_range: [1, 5]
