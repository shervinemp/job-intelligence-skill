name: ashby
version: 1
notes: |
  Recaptcha textarea at bottom of form — ignore (not a real field).

detect:
  domains:
    - ashbyhq.com
    - jobs.ashbyhq.com

probe:
  best_strategy: standard
  widgets:
    dropdown: "button[aria-haspopup='listbox']"

patterns:
  login_wall:
    - "sign in to apply"
  guest_apply:
    - "apply without signing in"
  already_applied:
    - "you have already applied"
    - "already applied"

properties:
  multi_page: false
  has_eeo: false
  has_progress_bar: false
  page_range: [1, 1]
