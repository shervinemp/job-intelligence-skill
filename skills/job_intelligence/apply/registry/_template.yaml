# Platform registry template
# Copy this file, rename to <platform>.yaml, fill in your platform's details.
# Fields marked with * are optional — omit if not applicable.

name: <platform_name>        # e.g. workday, greenhouse, lever
version: 1

detect:
  domains:
    - <domain1.com>           # URL substrings that identify this platform
    - <domain2.com>           # (checked against page URL host)

probe:
  best_strategy: standard     # Optimal probe depth (standard | dialog | iframe | lazy_load)
  widgets:
    dropdown: "button[aria-haspopup='listbox']"  # * Custom widget CSS selectors
    autocomplete: "input[role='combobox']"       # *

patterns:
  login_wall:                 # * Text signals indicating login required
    - "sign in to apply"
  guest_apply:                # * Button text for guest/continue without login
    - "continue without signing in"
  already_applied:            # * Text signals indicating already applied
    - "already applied"

properties:
  multi_page: true            # Does this platform have multi-page forms?
  has_eeo: false              # Does it have EEO/demographics pages?
  has_progress_bar: false     # * Shows progress indicator?
  page_range: [1, 10]         # * Expected min/max pages (dynamic)
